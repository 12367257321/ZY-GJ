<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简单图像标注工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            line-height: 1.6;
            color: #333;
            background: #f8f9fa;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            max-width: 900px;
            margin-bottom: 25px;
        }

        h1 {
            font-weight: 400;
            color: #2c3e50;
            text-align: center;
            padding: 10px 0;
            border-bottom: 1px solid #eaeaea;
            margin-bottom: 15px;
        }

        .instruction {
            text-align: center;
            font-size: 15px;
            color: #7f8c8d;
            margin: 5px 0 10px;
        }

        .container {
            position: relative;
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            border-radius: 8px;
        }

        #image-container {
            position: relative;
            cursor: pointer;
            transition: transform 0.3s ease;
            background-color: #f0f0f0;
        }

            #image-container.zoomed {
                cursor: zoom-out;
            }

            #image-container img {
                display: block;
                max-width: 100%;
                max-height: 70vh;
                margin: 0 auto;
            }

        #draw-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
            width: 100%;
            max-width: 900px;
        }

        .control-btn {
            padding: 8px 18px;
            font-size: 15px;
            background: #fff;
            border: 1px solid #3498db;
            color: #3498db;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

            .control-btn:hover {
                background: #3498db;
                color: white;
            }

        footer {
            margin-top: 20px;
            padding: 15px;
            color: #7f8c8d;
            font-size: 13px;
            text-align: center;
            border-top: 1px solid #eee;
            width: 100%;
            max-width: 900px;
        }

        .status {
            background: #3498db;
            color: white;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 13px;
            margin-left: 10px;
            transition: all 0.3s ease;
        }

        @media (max-width: 768px) {
            body {
                padding: 15px 10px;
            }

            h1 {
                font-size: 24px;
            }

            .controls {
                flex-wrap: wrap;
            }

            .control-btn {
                padding: 8px 14px;
                font-size: 14px;
            }

            .instruction {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>简单图像标注工具</h1>
        <p class="instruction">点击图片放大/缩小 · 可使用红色标记进行批注 · 右键保存图片</p>
    </header>

    <div class="container">
        <div id="image-container">
            <img id="annotated-image" src="http://tcyc.vip:9012/homework/1/21/251025223050047数据库关系图.png" alt="可标注图片">
            <canvas id="draw-canvas"></canvas>
        </div>
    </div>

    <div class="controls">
        <button id="clear-btn" class="control-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14zm0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16z" />
                <path d="M4.646 4.646a.5.5 0 0 1 .708 0L8 7.293l2.646-2.647a.5.5 0 0 1 .708.708L8.707 8l2.647 2.646a.5.5 0 0 1-.708.708L8 8.707l-2.646 2.647a.5.5 0 0 1-.708-.708L7.293 8 4.646 5.354a.5.5 0 0 1 0-.708z" />
            </svg>
            清除批注
        </button>

        <div class="control-btn">
            画笔: 红色
            <span class="status" id="draw-status">已启用</span>
        </div>

        <button id="reset-btn" class="control-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                <path fill-rule="evenodd" d="M8 3a5 5 0 1 1-4.546 2.914.5.5 0 0 0-.908-.417A6 6 0 1 0 8 2v1z" />
                <path d="M8 4.466V.534a.25.25 0 0 0-.41-.192L5.23 2.308a.25.25 0 0 0 0 .384l2.36 1.966A.25.25 0 0 0 8 4.466z" />
            </svg>
            重置视图
        </button>
    </div>

    <footer>
        ✏️ 简单图片批注工具 | 左键绘图 · 右键保存图片
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const imageContainer = document.getElementById('image-container');
            const canvas = document.getElementById('draw-canvas');
            const imageElement = document.getElementById('annotated-image');
            const clearBtn = document.getElementById('clear-btn');
            const resetBtn = document.getElementById('reset-btn');
            const drawStatus = document.getElementById('draw-status');

            const ctx = canvas.getContext('2d');
            let isDrawing = false;
            let lastX = 0;
            let lastY = 0;
            let isZoomed = false;

            // 设置canvas尺寸
            function setupCanvas() {
                canvas.width = imageContainer.clientWidth;
                canvas.height = imageContainer.clientHeight;
                ctx.strokeStyle = '#e74c3c';
                ctx.lineWidth = 4;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
            }

            // 图片加载时初始化
            imageElement.onload = function () {
                setupCanvas();

                // 添加图片保存功能
                imageElement.oncontextmenu = function (e) {
                    e.preventDefault();
                    saveImageWithAnnotations();
                };
            };

            // 窗口大小变化时调整canvas
            window.addEventListener('resize', setupCanvas);

            // 缩放功能
            imageContainer.addEventListener('click', function () {
                isZoomed = !isZoomed;

                if (isZoomed) {
                    imageContainer.classList.add('zoomed');
                    imageElement.style.transform = 'scale(1.5)';
                } else {
                    imageContainer.classList.remove('zoomed');
                    imageElement.style.transform = 'scale(1)';
                }

                setupCanvas();
            });

            // 绘图功能
            canvas.addEventListener('mousedown', startDrawing);
            canvas.addEventListener('mousemove', draw);
            canvas.addEventListener('mouseup', stopDrawing);
            canvas.addEventListener('mouseout', stopDrawing);

            function startDrawing(e) {
                isDrawing = true;
                [lastX, lastY] = getCanvasCoordinates(e);
            }

            function draw(e) {
                if (!isDrawing) return;

                const [currentX, currentY] = getCanvasCoordinates(e);

                ctx.beginPath();
                ctx.moveTo(lastX, lastY);
                ctx.lineTo(currentX, currentY);
                ctx.stroke();

                [lastX, lastY] = [currentX, currentY];
            }

            function stopDrawing() {
                isDrawing = false;
            }

            // 获取Canvas坐标
            function getCanvasCoordinates(e) {
                const rect = canvas.getBoundingClientRect();
                return [
                    e.clientX - rect.left,
                    e.clientY - rect.top
                ];
            }

            // 清除批注
            clearBtn.addEventListener('click', function () {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                drawStatus.style.backgroundColor = '#3498db';
                drawStatus.textContent = '已清除';

                setTimeout(() => {
                    drawStatus.style.backgroundColor = '';
                    drawStatus.textContent = '已启用';
                }, 1500);
            });

            // 重置视图
            resetBtn.addEventListener('click', function () {
                if (isZoomed) {
                    isZoomed = false;
                    imageContainer.classList.remove('zoomed');
                    imageElement.style.transform = 'scale(1)';
                    setupCanvas();
                }
            });

            // 保存带批注的图片
            function saveImageWithAnnotations() {
                // 创建临时canvas绘制所有元素
                const tempCanvas = document.createElement('canvas');
                const tempCtx = tempCanvas.getContext('2d');

                tempCanvas.width = imageElement.naturalWidth;
                tempCanvas.height = imageElement.naturalHeight;

                // 绘制原始图片
                tempCtx.drawImage(imageElement, 0, 0, tempCanvas.width, tempCanvas.height);

                // 绘制批注
                tempCtx.drawImage(canvas, 0, 0, tempCanvas.width, tempCanvas.height);

                // 创建下载链接
                const link = document.createElement('a');
                link.download = '标注图片_' + new Date().toISOString().slice(0, 10) + '.png';
                link.href = tempCanvas.toDataURL('image/png');
                link.click();

                drawStatus.style.backgroundColor = '#27ae60';
                drawStatus.textContent = '图片已保存';

                setTimeout(() => {
                    drawStatus.style.backgroundColor = '';
                    drawStatus.textContent = '已启用';
                }, 1500);
            }
        });
    </script>
</body>
</html>
