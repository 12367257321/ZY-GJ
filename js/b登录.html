<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教师作业批改系统</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #2c3e50, #3498db);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            display: flex;
            width: 900px;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.25);
            overflow: hidden;
        }

        .welcome-section {
            flex: 1;
            background: linear-gradient(45deg, #3498db, #2c3e50);
            color: white;
            padding: 50px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center;
        }

            .welcome-section h1 {
                font-size: 42px;
                margin-bottom: 20px;
                animation: fadeIn 1s ease;
            }

            .welcome-section p {
                font-size: 18px;
                line-height: 1.6;
                opacity: 0.9;
                animation: fadeIn 1.2s ease;
            }

        .animation-container {
            margin: 30px 0;
            height: 120px;
            position: relative;
        }

        .circle {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
        }

        .circle-1 {
            width: 100px;
            height: 100px;
            top: 10px;
            left: 10px;
            animation: circle1 8s linear infinite;
        }

        .circle-2 {
            width: 70px;
            height: 70px;
            top: 40px;
            right: 20px;
            animation: circle2 8s linear infinite;
        }

        .circle-3 {
            width: 50px;
            height: 50px;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            animation: circle3 8s linear infinite;
        }

        .login-section {
            flex: 1;
            padding: 50px 40px;
            background: #fff;
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

            .login-header h2 {
                font-size: 32px;
                color: #2c3e50;
                margin-bottom: 10px;
            }

            .login-header p {
                color: #7f8c8d;
                font-size: 16px;
            }

        .main-content {
            background: #f8f9fa;
            padding: 40px;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .login-form {
            width: 100%;
            max-width: 320px;
        }

        .form-group {
            margin-bottom: 24px;
            position: relative;
        }

            .form-group label {
                display: block;
                margin-bottom: 8px;
                font-weight: 500;
                color: #34495e;
            }

        .input-with-icon {
            position: relative;
        }

            .input-with-icon i {
                position: absolute;
                left: 15px;
                top: 50%;
                transform: translateY(-50%);
                color: #7f8c8d;
            }

        .form-control {
            width: 100%;
            padding: 14px 20px 14px 48px;
            border: 2px solid #e1e5eb;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

            .form-control:focus {
                border-color: #3498db;
                box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
                outline: none;
            }

        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 14px;
        }

        .remember-me {
            display: flex;
            align-items: center;
        }

            .remember-me input {
                margin-right: 8px;
            }

        .forgot-password {
            color: #3498db;
            text-decoration: none;
            transition: color 0.2s;
        }

            .forgot-password:hover {
                color: #2980b9;
                text-decoration: underline;
            }

        .btn {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .login-btn {
            background: linear-gradient(to right, #3498db, #2980b9);
            color: white;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3);
        }

            .login-btn:hover {
                background: linear-gradient(to right, #2980b9, #2573a7);
                transform: translateY(-3px);
                box-shadow: 0 6px 20px rgba(52, 152, 219, 0.4);
            }

        .logout-btn {
            background: #e74c3c;
            color: white;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(231, 76, 60, 0.3);
        }

            .logout-btn:hover {
                background: #c0392b;
                transform: translateY(-3px);
                box-shadow: 0 6px 20px rgba(231, 76, 60, 0.4);
            }

        .status-bar {
            width: 100%;
            max-width: 320px;
            background: #ecf0f1;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
            text-align: center;
            display: none;
        }

            .status-bar h3 {
                color: #2c3e50;
                margin-bottom: 10px;
            }

            .status-bar p {
                color: #7f8c8d;
                font-size: 15px;
            }

        .user-info {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            justify-content: center;
        }

        .user-icon {
            background: #3498db;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-right: 12px;
        }

        .tips {
            margin-top: 20px;
        }

            .tips p {
                display: flex;
                align-items: center;
                margin: 10px 0;
                font-size: 16px;
            }

            .tips i {
                margin-right: 10px;
                font-size: 20px;
            }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes circle1 {
            0% {
                transform: translate(0, 0);
            }

            50% {
                transform: translate(20px, 20px);
            }

            100% {
                transform: translate(0, 0);
            }
        }

        @keyframes circle2 {
            0% {
                transform: translate(0, 0);
            }

            50% {
                transform: translate(-15px, -15px);
            }

            100% {
                transform: translate(0, 0);
            }
        }

        @keyframes circle3 {
            0% {
                transform: translateX(-50%) translateY(0);
            }

            50% {
                transform: translateX(-50%) translateY(15px);
            }

            100% {
                transform: translateX(-50%) translateY(0);
            }
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                max-width: 500px;
            }

            .welcome-section {
                padding: 30px;
            }

            .circle {
                display: none;
            }
        }

        .password-container {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            top: 50%;
            right: 15px;
            transform: translateY(-50%);
            cursor: pointer;
            color: #7f8c8d;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="welcome-section">
            <h1>教师作业批改系统</h1>
            <p>专属教育工作者的一站式作业批改与管理系统，提高效率，专注教学。</p>

            <div class="animation-container">
                <div class="circle circle-1"></div>
                <div class="circle circle-2"></div>
                <div class="circle circle-3"></div>
            </div>

            <div class="tips">
                <p><i class="fas fa-check-circle"></i> 一键批改多种题型作业</p>
                <p><i class="fas fa-chart-line"></i> 智能生成学生成绩分析</p>
                <p><i class="fas fa-clock"></i> 节省85%的批改时间</p>
            </div>
        </div>

        <div class="login-section">
            <div class="login-header">
                <h2>教师登录</h2>
                <p>使用工号/手机号和密码登录系统</p>
            </div>

            <div class="main-content">
                <form class="login-form" id="loginForm">
                    <div class="form-group">
                        <label for="username">工号 / 手机号</label>
                        <div class="input-with-icon">
                            <i class="fas fa-user-graduate"></i>
                            <input type="text" id="username" class="form-control"
                                   placeholder="请输入工号或手机号" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password">密码</label>
                        <div class="input-with-icon">
                            <i class="fas fa-lock"></i>
                            <div class="password-container">
                                <input type="password" id="password" class="form-control"
                                       placeholder="请输入密码" required>
                                <span class="toggle-password" id="togglePassword">
                                    <i class="fas fa-eye"></i>
                                </span>
                            </div>
                        </div>
                    </div>

                    <div class="remember-forgot">
                        <div class="remember-me">
                            <input type="checkbox" id="remember" checked>
                            <label for="remember">记住登录状态</label>
                        </div>
                        <a href="#" class="forgot-password">忘记密码？</a>
                    </div>

                    <button type="submit" class="btn login-btn">进入批改系统</button>
                </form>

                <button id="logoutBtn" class="btn logout-btn" style="display: none;">
                    <i class="fas fa-sign-out-alt"></i> 退出系统
                </button>
            </div>

            <div class="status-bar" id="statusBar">
                <div class="user-info">
                    <div class="user-icon">
                        <i class="fas fa-chalkboard-teacher"></i>
                    </div>
                    <div>
                        <h3 id="loggedUser">李老师</h3>
                    </div>
                </div>
                <p>您已成功登录作业批改系统！</p>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loginForm = document.getElementById('loginForm');
            const logoutBtn = document.getElementById('logoutBtn');
            const statusBar = document.getElementById('statusBar');
            const togglePassword = document.getElementById('togglePassword');
            const passwordInput = document.getElementById('password');
            const rememberCheck = document.getElementById('remember');

            // 检查是否已有登录状态
            checkLoginStatus();

            // 显示/隐藏密码
            togglePassword.addEventListener('click', () => {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                togglePassword.innerHTML = type === 'password' ?
                    '<i class="fas fa-eye"></i>' : '<i class="fas fa-eye-slash"></i>';
            });

            // 登录表单提交
            loginForm.addEventListener('submit', (e) => {
                e.preventDefault();

                const username = document.getElementById('username').value;
                const password = document.getElementById('password').value;

                // 模拟登录验证
                if(username && password) {
                    // "记住登录状态"功能
                    if(rememberCheck.checked) {
                        localStorage.setItem('isLoggedIn', 'true');
                        localStorage.setItem('username', username);
                    } else {
                        sessionStorage.setItem('isLoggedIn', 'true');
                        sessionStorage.setItem('username', username);
                    }

                    // 显示登录结果
                    document.getElementById('loggedUser').textContent = username;
                    updateUI(true);

                    // 显示登录成功动画效果
                    loginBtnAnimation();
                } else {
                    alert('请输入完整的登录信息！');
                }
            });

            // 登录动画
            function loginBtnAnimation() {
                const btn = document.querySelector('.login-btn');
                btn.innerHTML = '<i class="fas fa-check"></i> 登录成功';
                btn.style.background = 'linear-gradient(to right, #2ecc71, #27ae60)';

                setTimeout(() => {
                    btn.innerHTML = '进入批改系统';
                    btn.style.background = 'linear-gradient(to right, #3498db, #2980b9)';
                }, 2000);
            }

            // 退出登录
            logoutBtn.addEventListener('click', () => {
                localStorage.removeItem('isLoggedIn');
                localStorage.removeItem('username');
                sessionStorage.removeItem('isLoggedIn');
                sessionStorage.removeItem('username');

                // 清空表单
                loginForm.reset();

                // 更新UI
                updateUI(false);
            });

            // 检查登录状态
            function checkLoginStatus() {
                const isLocalLoggedIn = localStorage.getItem('isLoggedIn');
                const isSessionLoggedIn = sessionStorage.getItem('isLoggedIn');

                if(isLocalLoggedIn || isSessionLoggedIn) {
                    const username = localStorage.getItem('username') || sessionStorage.getItem('username');
                    document.getElementById('loggedUser').textContent = username;
                    updateUI(true);
                }
            }

            // 更新UI显示状态
            function updateUI(isLoggedIn) {
                if(isLoggedIn) {
                    loginForm.style.display = 'none';
                    logoutBtn.style.display = 'block';
                    statusBar.style.display = 'block';

                    // 预先填充用户名
                    const username = localStorage.getItem('username') || sessionStorage.getItem('username');
                    document.getElementById('username').value = username;
                } else {
                    loginForm.style.display = 'block';
                    logoutBtn.style.display = 'none';
                    statusBar.style.display = 'none';
                }
            }
        });
    </script>
</body>
</html>
