<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>下载中心 - 作业管家</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f3f9ff 0%, #e1ecff 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin: 30px 0;
            padding: 0 10px;
            position: relative;
        }

        .back-link {
            position: absolute;
            left: 0;
            top: 15px;
            display: flex;
            align-items: center;
            color: #5c6bc9;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s;
        }

            .back-link i {
                margin-right: 5px;
            }

            .back-link:hover {
                color: #4a6bff;
                transform: translateX(-3px);
            }

        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 15px;
        }

        .logo {
            background: #20c997;
            width: 70px;
            height: 70px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 32px;
            box-shadow: 0 8px 20px rgba(32, 201, 151, 0.4);
        }

        h1 {
            font-size: 2.8rem;
            background: linear-gradient(90deg, #20c997, #0c9a75);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        p.subtitle {
            font-size: 1.25rem;
            color: #5c6bc9;
            max-width: 700px;
            margin: 0 auto 30px;
            line-height: 1.6;
            font-weight: 500;
        }

        .stat-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.07);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

            .stat-card::after {
                content: '';
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 4px;
                background: linear-gradient(90deg, #20c997, #4a6bff);
            }

            .stat-card:hover {
                transform: translateY(-5px);
                box-shadow: 0 12px 30px rgba(0, 0, 0, 0.12);
            }

            .stat-card.green .stat-title {
                color: #20c997;
            }

            .stat-card.blue .stat-title {
                color: #4a6bff;
            }

            .stat-card.purple .stat-title {
                color: #7950f2;
            }

            .stat-card .stat {
                font-size: 2.8rem;
                font-weight: 800;
                margin: 15px 0 5px;
                background: linear-gradient(90deg, #4a6bff, #0c2bc2);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
            }

        .stat-title {
            color: #7a8bc8;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            font-size: 1.1rem;
        }

            .stat-title i {
                background: #f0f3ff;
                width: 42px;
                height: 42px;
                border-radius: 12px;
                display: flex;
                align-items: center;
                justify-content: center;
                color: #4a6bff;
                font-size: 22px;
                transition: all 0.3s;
            }

        .controls {
            background: white;
            border-radius: 16px;
            box-shadow: 0 5px 20px rgba(74, 107, 255, 0.15);
            padding: 25px;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }

            .controls::before {
                content: '';
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 4px;
                background: linear-gradient(90deg, #20c997, #4a6bff);
            }

        .controls-title {
            font-size: 1.3rem;
            color: #2b3c7a;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

            .controls-title i {
                background: #f0f3ff;
                width: 40px;
                height: 40px;
                border-radius: 10px;
                display: flex;
                align-items: center;
                justify-content: center;
                color: #4a6bff;
            }

        .filter-group {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
        }

        .filter-item {
            position: relative;
        }

            .filter-item label {
                display: block;
                margin-bottom: 8px;
                color: #5c6bc9;
                font-weight: 600;
                font-size: 1.05rem;
            }

            .filter-item input, .filter-item select {
                width: 100%;
                padding: 16px 25px 16px 55px;
                border: 1px solid #e1e6f0;
                border-radius: 14px;
                background: #f9faff;
                font-size: 1.1rem;
                box-shadow: inset 0 2px 8px rgba(0,0,0,0.03);
                transition: all 0.3s ease;
                color: #334;
                font-weight: 500;
            }

                .filter-item input:focus, .filter-item select:focus {
                    outline: none;
                    border-color: #4a6bff;
                    box-shadow: 0 0 0 3px rgba(74, 107, 255, 0.2);
                    background: white;
                }

            .filter-item i {
                position: absolute;
                left: 22px;
                top: 50%;
                transform: translateY(-50%);
                color: #5c6bc9;
                font-size: 20px;
            }

            .filter-item select {
                appearance: none;
                -webkit-appearance: none;
                -moz-appearance: none;
                background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%235c6bc9' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
                background-repeat: no-repeat;
                background-position: right 20px center;
                background-size: 18px;
            }

        .file-list {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 7px 35px rgba(74, 107, 255, 0.15);
            margin-bottom: 30px;
            animation: fadeIn 0.6s ease-out;
            position: relative;
        }

            .file-list::before {
                content: '';
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 4px;
                background: linear-gradient(90deg, #20c997, #4a6bff);
            }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .list-header {
            display: grid;
            grid-template-columns: 25% 15% 15% 25% 20%;
            padding: 22px 30px;
            background: #f0f3ff;
            color: #5c6bc9;
            font-weight: 700;
            font-size: 1.15rem;
        }

        .file-item {
            display: grid;
            grid-template-columns: 25% 15% 15% 25% 20%;
            padding: 25px 30px;
            border-bottom: 1px solid #edf1ff;
            transition: all 0.3s;
            cursor: pointer;
            align-items: center;
        }

            .file-item:hover {
                background: #f8f9ff;
                transform: translateY(-3px);
                box-shadow: 0 10px 25px rgba(74, 107, 255, 0.15);
                border-radius: 8px;
                margin: 5px;
            }

        .file-info, .file-date, .file-description, .file-subject, .file-actions {
            display: flex;
            align-items: center;
            padding: 0 10px;
        }

        .file-icon {
            width: 55px;
            height: 55px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 20px;
            font-size: 1.8rem;
            color: white;
            flex-shrink: 0;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

            .file-icon.math {
                background: linear-gradient(135deg, #ff8e8e, #ff5252);
            }

            .file-icon.english {
                background: linear-gradient(135deg, #6bcbff, #1a8cff);
            }

        .file-name {
            font-weight: 700;
            margin-bottom: 8px;
            font-size: 1.25rem;
            color: #2b3c7a;
        }

        .file-meta {
            color: #7a8bc8;
            font-size: 1.0rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

            .file-meta i {
                color: #20c997;
            }

        .file-date {
            color: #5c6bc9;
            font-weight: 500;
            font-size: 1.1rem;
        }

        .file-description {
            color: #556;
            line-height: 1.5;
            font-size: 1.1rem;
        }

        .file-subject span {
            display: inline-block;
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: 700;
            font-size: 1.05rem;
            box-shadow: 0 4px 8px rgba(0,0,0,0.08);
        }

        .file-math span {
            background: linear-gradient(to right, #fff3f3, #ffeaea);
            color: #ff5252;
            border: 1px solid #ffdbdb;
        }

        .btn-download {
            background: linear-gradient(to right, #20c997, #18b185);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-size: 1.1rem;
            box-shadow: 0 6px 18px rgba(32, 201, 151, 0.35);
            letter-spacing: 0.5px;
        }

            .btn-download:hover {
                background: linear-gradient(to right, #18b185, #0f996b);
                transform: translateY(-2px);
                box-shadow: 0 8px 22px rgba(32, 201, 151, 0.45);
            }

            .btn-download:active {
                transform: translateY(1px);
                box-shadow: 0 3px 12px rgba(32, 201, 151, 0.4);
            }

        .empty-state {
            text-align: center;
            padding: 70px 20px;
            color: #95a5a6;
        }

            .empty-state i {
                font-size: 6rem;
                margin-bottom: 25px;
                color: #e1ecff;
                background: linear-gradient(45deg, #20c997, #4a6bff);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                opacity: 0.7;
            }

            .empty-state p {
                font-size: 1.5rem;
                color: #5c6bc9;
                margin-bottom: 20px;
                font-weight: 600;
            }

                .empty-state p.sub {
                    font-size: 1.15rem;
                    color: #7a8bc8;
                    max-width: 600px;
                    margin: 0 auto;
                    font-weight: normal;
                }

        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 12px 25px;
            background: #f0f3ff;
            border-radius: 25px;
            font-size: 1.15rem;
            color: #4a6bff;
            font-weight: 600;
            margin: 15px 0 30px;
            box-shadow: 0 4px 10px rgba(74, 107, 255, 0.15);
        }

            .status-indicator .dot {
                width: 14px;
                height: 14px;
                border-radius: 50%;
                background: #4a6bff;
                box-shadow: 0 0 10px rgba(74, 107, 255, 0.5);
            }

        .file-actions {
            justify-content: center;
        }

        /* Mobile responsiveness */
        @media (max-width: 1024px) {
            .list-header, .file-item {
                grid-template-columns: 30% 20% 20% 30%;
                grid-template-areas:
                    "info info date date"
                    "subject description actions actions";
            }

            .file-info {
                grid-area: info;
            }

            .file-date {
                grid-area: date;
                text-align: right;
            }

            .file-subject {
                grid-area: subject;
            }

            .file-description {
                grid-area: description;
            }

            .file-actions {
                grid-area: actions;
            }

            .file-actions {
                margin-top: 20px;
                padding-left: 10px;
                justify-content: flex-start;
            }
        }

        @media (max-width: 768px) {
            .logo-container {
                flex-direction: column;
                text-align: center;
            }

            h1 {
                font-size: 2.3rem;
            }

            .stat-cards {
                grid-template-columns: 1fr;
            }

            .filter-group {
                grid-template-columns: 1fr;
            }

            .list-header {
                display: none;
            }

            .file-item {
                grid-template-columns: 1fr;
                grid-template-areas:
                    "info"
                    "date"
                    "subject"
                    "description"
                    "actions";
                grid-gap: 15px;
                padding: 25px;
            }

            .file-info, .file-date,
            .file-subject, .file-description,
            .file-actions {
                padding: 0;
            }

            .file-date {
                border-top: 1px dashed #edf1ff;
                padding-top: 15px;
                margin-top: 5px;
            }

            .btn-download {
                width: 100%;
                margin-top: 10px;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 2rem;
            }

            p.subtitle {
                font-size: 1.1rem;
            }

            .file-icon {
                width: 45px;
                height: 45px;
                font-size: 1.5rem;
                margin-right: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="#" class="back-link">
                <i class="fas fa-arrow-left"></i> 返回首页
            </a>
            <div class="logo-container">
                <div class="logo">
                    <i class="fas fa-graduation-cap"></i>
                </div>
                <h1>下载中心</h1>
            </div>
            <p class="subtitle">获取课程资源、作业文档和学习资料</p>
        </header> 
     

        <div class="controls">
            <!--<div class="controls-title">
                <i class="fas fa-sliders-h"></i>
                <span>筛选条件</span>
            </div>-->
            <div class="filter-group">
                <div class="filter-item">
                    <label for="start-date">起始日期</label>
                    <div style="position:relative">
                        <i class="fas fa-calendar-alt"></i>
                        <input type="date" id="start-date" class="date-picker" value="2025-09-01">
                    </div>
                </div>

                <div class="filter-item">
                    <label for="end-date">结束日期</label>
                    <div style="position:relative">
                        <i class="fas fa-calendar-alt"></i>
                        <input type="date" id="end-date" class="date-picker" value="2025-11-30">
                    </div>
                </div>

                <div class="filter-item">
                    <label for="subject-filter">学科筛选</label>
                    <div style="position:relative">
                        <i class="fas fa-book"></i>
                        <select id="subject-filter">
                            <option value="all">全部科目</option>
                            <option value="数学">数学</option>
                            <option value="语文" selected>语文</option>
                            <option value="英语">英语</option>
                            <option value="物理">物理</option>
                            <option value="化学">化学</option>
                            <option value="生物">生物</option>
                            <option value="历史">历史</option>
                            <option value="政治">政治</option>
                            <option value="地理">地理</option>
                            <option value="其他">其他</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <div class="file-list">
            <div class="list-header">
                <div class="file-info">文件名称</div>
                <div class="file-date">上传日期</div>
                <div class="file-subject">科目</div>
                <div class="file-description">详细说明</div>
                <div class="file-actions">操作</div>
            </div>
            <div id="filesContainer">
                <div class="file-item">
                    <div class="file-info">
                        <div class="file-icon math">
                            <i class="fas fa-file-pdf"></i>
                        </div>
                        <div class="file-text">
                            <div class="file-name">高二上学期数学测试卷</div>
                            <div class="file-meta">
                                <i class="fas fa-download"></i> 142次下载 · 8.2 MB
                            </div>
                        </div>
                    </div>
                    <div class="file-date">
                        2025-09-15
                    </div>
                    <div class="file-subject">
                        <span class="file-math">数学</span>
                    </div>
                    <div class="file-description">
                        高二上学期期中考试数学试卷及答案解析
                    </div>
                    <div class="file-actions">
                        <button class="btn-download" data-id="1">
                            <i class="fas fa-download"></i> 下载
                        </button>
                    </div>
                </div>
                 
                <div class="file-item">
                    <div class="file-info">
                        <div class="file-icon math">
                            <i class="fas fa-file-alt"></i>
                        </div>
                        <div class="file-text">
                            <div class="file-name">高中数学公式大全</div>
                            <div class="file-meta">
                                <i class="fas fa-download"></i> 518次下载 · 1.8 MB
                            </div>
                        </div>
                    </div>
                    <div class="file-date">
                        2025-09-30
                    </div>
                    <div class="file-subject">
                        <span class="file-math">数学</span>
                    </div>
                    <div class="file-description">
                        高中数学所有公式整理汇总，方便记忆和使用
                    </div>
                    <div class="file-actions">
                        <button class="btn-download" data-id="5">
                            <i class="fas fa-download"></i> 下载
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // 为所有下载按钮添加事件
            const downloadBtns = document.querySelectorAll('.btn-download');

            downloadBtns.forEach(btn => {
                btn.addEventListener('click', function () {
                    const originalText = btn.innerHTML;
                    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 下载中...';
                    btn.style.opacity = '0.8';

                    // 模拟下载过程
                    setTimeout(() => {
                        btn.innerHTML = '<i class="fas fa-check"></i> 下载完成';
                        btn.style.background = 'linear-gradient(to right, #28a745, #218838)';

                        // 恢复按钮状态
                        setTimeout(() => {
                            btn.innerHTML = originalText;
                            btn.style.background = 'linear-gradient(to right, #20c997, #18b185)';
                            btn.style.opacity = '1';
                        }, 2000);
                    }, 1500);
                });
            });
        });
    </script>
</body>
</html>
