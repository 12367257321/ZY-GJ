<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作业管家 - 智能化学习助手</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #0CA678;
            --primary-light: #20c997;
            --primary-dark: #087f5b;
            --secondary: #4d70f3;
            --accent: #ff9a8c;
            --light: #ffffff;
            --dark: #2D334A;
            --gray-200: #f1f5f9;
            --gray-300: #e2e8f0;
            --gray-400: #CBD5E1;
            --gray-500: #94a3b8;
            --gray-600: #64748B;
            --gray-700: #334155;
            --shadow-sm: 0 4px 6px rgba(0, 0, 0, 0.1);
            --shadow-md: 0 6px 12px rgba(0, 0, 0, 0.15);
            --shadow-lg: 0 10px 25px rgba(0, 0, 0, 0.2);
            --card-radius: 16px;
            --header-height: 70px;
            --transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #e0f7ff 0%, #f3f7ff 100%);
            color: #334155;
            min-height: 100vh;
            padding-bottom: 30px;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* 页面装饰元素 */
        .decoration {
            position: fixed;
            width: 650px;
            height: 650px;
            border-radius: 50%;
            z-index: -1;
        }

            .decoration::before, .decoration::after {
                content: '';
                position: absolute;
                border-radius: inherit;
            }

        .decoration-1 {
            top: -330px;
            right: -300px;
            background: radial-gradient(circle, rgba(12, 166, 120, 0.07) 0%, transparent 60%);
        }

        .decoration-2 {
            bottom: -250px;
            left: -200px;
            background: radial-gradient(circle, rgba(77, 112, 243, 0.07) 0%, transparent 60%);
        }

        .dot-pattern {
            position: fixed;
            width: 300px;
            height: 300px;
            background-image: radial-gradient(rgba(12, 166, 120, 0.15) 2px, transparent 2px);
            background-size: 30px 30px;
            z-index: -1;
        }

        .dot-1 {
            top: 20%;
            left: 10%;
        }

        .dot-2 {
            bottom: 10%;
            right: 15%;
            transform: rotate(45deg);
        }

        /* 顶部导航 */
        header {
            background: linear-gradient(120deg, var(--primary), var(--primary-light));
            box-shadow: 0 3px 10px rgba(8, 127, 91, 0.25);
            height: var(--header-height);
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
            z-index: 100;
        }

            header::after {
                content: '';
                position: absolute;
                bottom: 0;
                left: 0;
                right: 0;
                height: 4px;
                background: rgba(255, 255, 255, 0.3);
            }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: white;
            text-decoration: none;
        }

        .logo-icon {
            width: 38px;
            height: 38px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

            .logo-icon i {
                font-size: 20px;
            }

        .logo-text {
            font-weight: 700;
            font-size: 22px;
            letter-spacing: 0.5px;
        }

        .user-nav {
            display: flex;
            align-items: center;
            gap: 20px;
        }

            .user-nav a {
                color: white;
                opacity: 0.85;
                transition: opacity 0.3s;
            }

                .user-nav a:hover {
                    opacity: 1;
                    transform: translateY(-2px);
                }

        .notification, .message {
            position: relative;
            font-size: 18px;
        }

        .badge {
            position: absolute;
            top: -6px;
            right: -8px;
            width: 18px;
            height: 18px;
            background: var(--accent);
            color: white;
            font-size: 11px;
            font-weight: 700;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .user-avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: 2px solid white;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s;
        }

            .user-avatar:hover {
                transform: scale(1.08);
            }

            .user-avatar img {
                width: 100%;
                height: 100%;
                object-fit: cover;
                display: block;
            }

        /* 主内容区 */
        .main-content {
            max-width: 1200px;
            margin: 40px auto 0;
            padding: 0 20px;
        }

        .welcome-section {
            text-align: center;
            padding: 30px 0;
            margin-bottom: 30px;
        }

        .welcome-title {
            font-size: 36px;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 15px;
            background: linear-gradient(135deg, var(--primary), #1d8cc6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .welcome-subtitle {
            font-size: 18px;
            max-width: 700px;
            margin: 0 auto;
            color: var(--gray-600);
            font-weight: 400;
        }

        /* 功能卡片区 */
        .features-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        .feature-card {
            background: white;
            border-radius: var(--card-radius);
            box-shadow: var(--shadow-md);
            overflow: hidden;
            transition: var(--transition);
            position: relative;
            border: 1px solid rgba(0, 0, 0, 0.05);
            height: 420px;
            display: flex;
            flex-direction: column;
        }

            .feature-card:hover {
                transform: translateY(-10px);
                box-shadow: var(--shadow-lg);
            }

        .card-decorator {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 180px;
            background-size: cover;
            z-index: 1;
            opacity: 0.1;
        }

        .assignment-decorator {
            background: linear-gradient(45deg, var(--primary), var(--primary-light));
        }

        .upload-decorator {
            background: linear-gradient(45deg, var(--secondary), #6c8cff);
        }

        .card-content {
            position: relative;
            z-index: 2;
            padding: 30px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .card-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px;
            color: white;
            font-size: 32px;
            box-shadow: 0 8px 20px rgba(12, 166, 120, 0.3);
        }

        .upload-icon {
            background: linear-gradient(135deg, var(--secondary), #6c8cff);
            box-shadow: 0 8px 20px rgba(77, 112, 243, 0.3);
        }

        .card-title {
            font-size: 28px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 18px;
            color: var(--dark);
        }

        .assignment-card .card-title {
            color: var(--primary-dark);
        }

        .upload-card .card-title {
            color: #364fc7;
        }

        .card-description {
            text-align: center;
            font-size: 16px;
            color: var(--gray-600);
            line-height: 1.7;
            margin-bottom: 30px;
            flex-grow: 1;
        }

        .feature-button {
            display: block;
            padding: 16px 0;
            background: var(--primary);
            color: white;
            text-align: center;
            text-decoration: none;
            font-weight: 600;
            font-size: 17px;
            border-radius: 12px;
            transition: var(--transition);
            box-shadow: 0 5px 15px rgba(12, 166, 120, 0.35);
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

            .feature-button::after {
                content: "";
                position: absolute;
                top: 0;
                left: -100%;
                width: 300%;
                height: 100%;
                background: linear-gradient(90deg, transparent 0%, rgba(255, 255, 255, 0.3) 50%, transparent 100%);
                transition: all 0.8s ease;
                z-index: -1;
            }

            .feature-button:hover::after {
                left: 100%;
            }

        .upload-btn {
            background: var(--secondary);
            box-shadow: 0 5px 15px rgba(77, 112, 243, 0.35);
        }

        .feature-button:hover {
            transform: translateY(-3px);
        }

        /* 状态统计 */
        .stats-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 25px;
            margin-top: 50px;
        }

        .stat-card {
            background: white;
            border-radius: var(--card-radius);
            padding: 30px;
            box-shadow: var(--shadow-sm);
            text-align: center;
            transition: var(--transition);
        }

            .stat-card:hover {
                transform: translateY(-5px);
                box-shadow: var(--shadow-md);
            }

        .stat-icon {
            font-size: 40px;
            margin-bottom: 20px;
            color: var(--primary);
        }

        .stat-value {
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 5px;
            color: var(--primary-dark);
        }

        .stat-label {
            font-size: 16px;
            color: var(--gray-600);
        }

        /* 底部信息 */
        .app-footer {
            text-align: center;
            padding: 40px 20px 20px;
            max-width: 800px;
            margin: 60px auto 0;
            color: var(--gray-500);
            font-size: 15px;
            opacity: 0.8;
        }

        .footer-logo {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 15px;
            display: inline-block;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 25px 0;
        }

        .social-link {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: white;
            color: var(--secondary);
            font-size: 18px;
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
        }

            .social-link:hover {
                transform: translateY(-5px);
                background: var(--secondary);
                color: white;
                box-shadow: var(--shadow-md);
            }

        /* 响应式布局 */
        @media (max-width: 768px) {
            .features-section {
                grid-template-columns: 1fr;
            }

            .welcome-title {
                font-size: 28px;
                margin-bottom: 10px;
            }

            .welcome-subtitle {
                font-size: 16px;
            }

            .stats-section {
                grid-template-columns: 1fr;
            }

            .feature-card {
                height: 380px;
            }

            .card-title {
                font-size: 24px;
            }
        }
    </style>
</head>

    <script>
        // 添加页面加载动画效果
        document.addEventListener('DOMContentLoaded', function() {
            // 卡片入场动画
            const featureCards = document.querySelectorAll('.feature-card');

            featureCards.forEach((card, index) => {
                card.style.opacity = '0';
                card.style.transform = 'translateY(20px)';
                setTimeout(() => {
                    card.style.transition = 'opacity 0.5s ease-out, transform 0.5s ease-out';
                    card.style.opacity = '1';
                    card.style.transform = 'translateY(0)';
                }, 200 + (index * 200));
            });

            // 按钮悬停效果增强
            const buttons = document.querySelectorAll('.feature-button');

            buttons.forEach(button => {
                button.addEventListener('mouseenter', function() {
                    const icon = this.querySelector('i');
                    if(icon) {
                        icon.style.transform = 'translateX(5px)';
                    }
                });

                button.addEventListener('mouseleave', function() {
                    const icon = this.querySelector('i');
                    if(icon) {
                        icon.style.transform = 'translateX(0)';
                    }
                });
            });

            // 统计卡片动画
            const statCards = document.querySelectorAll('.stat-card');

            setTimeout(() => {
                statCards.forEach((card, index) => {
                    card.style.opacity = '0';
                    card.style.transform = 'translateY(20px)';
                    setTimeout(() => {
                        card.style.transition = 'opacity 0.5s ease-out, transform 0.5s ease-out, box-shadow 0.3s ease';
                        card.style.opacity = '1';
                        card.style.transform = 'translateY(0)';
                    }, 200 + (index * 200));
                });
            }, 500);
        });
    </script>
